<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hamorona E-commerce</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="font-sans antialiased bg-gray-100">
    <header class="bg-white shadow-md py-4">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="text-2xl font-bold text-blue-600">Hamorona</a>
            <nav>
                <ul class="flex space-x-6 items-center">
                    <li><a href="index.html" class="text-gray-700 hover:text-blue-600">Fandraisana</a></li>
                    <li><a href="products.html" class="text-gray-700 hover:text-blue-600">Vokatra</a></li>
                    <li><a href="contact.html" class="text-gray-700 hover:text-blue-600">Fifandraisana</a></li>
                    <li>
                        <a href="cart.html" class="relative text-gray-700 hover:text-blue-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z" />
                            </svg>
                            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto my-8 px-4">
        <h1 class="text-4xl font-bold text-gray-800 mb-8 text-center">Fandraisana ho an'ny Admin</h1>

        <div class="bg-white p-8 rounded-lg shadow-md max-w-2xl mx-auto">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6">Ampidiro Vokatra Vaovao</h2>
            <form id="add-product-form" class="space-y-4">
                <div>
                    <label for="product-name" class="block text-sm font-medium text-gray-700">Anaran'ny Vokatra</label>
                    <input type="text" id="product-name" name="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="product-description" class="block text-sm font-medium text-gray-700">Famaritana</label>
                    <textarea id="product-description" name="description" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <div>
                    <label for="product-price" class="block text-sm font-medium text-gray-700">Vidiny (Ar)</label>
                    <input type="number" id="product-price" name="price" step="0.01" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="product-stock" class="block text-sm font-medium text-gray-700">Tahiry (Isany)</label>
                    <input type="number" id="product-stock" name="stock" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="product-image" class="block text-sm font-medium text-gray-700">URL Sary (tsy voatery)</label>
                    <input type="url" id="product-image" name="image_url" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">Ampidiro ny Vokatra</button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-8">
        <div class="container mx-auto text-center">
            <p>&copy; 2023 Hamorona E-commerce. Zo rehetra voatokana.</p>
            <p class="mt-2">Mifandraisa aminay amin'ny <a href="https://wa.me/261323911654" target="_blank" class="text-green-400 hover:underline">WhatsApp (+261 32 39 116 54)</a></p>
        </div>
    </footer>

    <script src="supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
